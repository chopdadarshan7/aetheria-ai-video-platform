apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetheria-backend
  labels:
    app: aetheria-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aetheria-backend
  template:
    metadata:
      labels:
        app: aetheria-backend
    spec:
      containers:
      - name: backend
        image: aetheria-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-service:5432/aetheria"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: aetheria-backend-service
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: aetheria-backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetheria-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: aetheria-backend-service
            port:
              number: 8000
